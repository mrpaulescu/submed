<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IUPAC Name Quiz — Organic Compounds</title>
<script src="https://unpkg.com/smiles-drawer@2.0.1/dist/smiles-drawer.min.js"></script>
<link rel="stylesheet" href="assets/styles/style.css">
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Outfit:wght@400;600;700&display=swap');

  * { box-sizing: border-box; }

  :root {
    --bg: #0f1419;
    --surface: #1a2332;
    --surface2: #243044;
    --border: #2d3d52;
    --text: #e6edf3;
    --muted: #8b9cb3;
    --accent: #58a6ff;
    --accent-dim: #388bfd66;
    --success: #3fb950;
    --danger: #f85149;
  }

  body {
    font-family: 'Outfit', sans-serif;
    background: var(--bg);
    color: var(--text);
    margin: 0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px;
  }

  h1 {
    font-weight: 700;
    font-size: 1.75rem;
    letter-spacing: -0.02em;
    margin: 0 0 8px 0;
    background: linear-gradient(135deg, #58a6ff, #a371f7);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .subtitle {
    color: var(--muted);
    font-size: 0.9rem;
    margin-bottom: 24px;
  }

  .app {
    display: flex;
    flex-direction: column;
    gap: 24px;
    max-width: 560px;
    width: 100%;
  }

  .score-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 16px;
    background: var(--surface);
    border-radius: 10px;
    border: 1px solid var(--border);
    font-size: 0.9rem;
  }

  .score-bar span {
    color: var(--muted);
  }

  .score-bar strong {
    color: var(--accent);
  }

  .canvas-wrap {
    background: var(--surface);
    border-radius: 12px;
    border: 1px solid var(--border);
    padding: 24px;
    min-height: 320px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #moleculeCanvas {
    background: #0d1117;
    border-radius: 8px;
    display: block;
  }

  .answer-section {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .answer-section label {
    font-size: 0.85rem;
    color: var(--muted);
  }

  .answer-section input {
    font-family: 'Outfit', sans-serif;
    font-size: 1.1rem;
    padding: 14px 18px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    width: 100%;
  }

  .answer-section input::placeholder {
    color: var(--muted);
    opacity: 0.8;
  }

  .answer-section input:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-dim);
  }

  .answer-section input.correct {
    border-color: var(--success);
    box-shadow: 0 0 0 2px rgba(63, 185, 80, 0.3);
  }

  .answer-section input.wrong {
    border-color: var(--danger);
    box-shadow: 0 0 0 2px rgba(248, 81, 73, 0.3);
  }

  .btn-row {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }

  .btn {
    font-family: 'Outfit', sans-serif;
    font-size: 1rem;
    font-weight: 600;
    padding: 12px 24px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
  }

  .btn:hover {
    transform: translateY(-1px);
  }

  .btn-primary {
    background: var(--accent);
    color: white;
  }

  .btn-primary:hover {
    background: #79b8ff;
  }

  .btn-secondary {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
  }

  .btn-secondary:hover {
    background: var(--border);
  }

  .feedback {
    min-height: 24px;
    font-weight: 600;
    font-size: 1rem;
  }

  .feedback.correct {
    color: var(--success);
  }

  .feedback.wrong {
    color: var(--danger);
  }

  .feedback .correct-answer {
    font-weight: 400;
    color: var(--muted);
    font-size: 0.9rem;
    margin-top: 4px;
  }

  .category-section {
    background: var(--surface);
    border-radius: 12px;
    border: 1px solid var(--border);
    padding: 14px 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .category-title {
    font-size: 0.85rem;
    color: var(--muted);
  }

  .category-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 8px;
  }

  .cat-chip {
    font-family: 'Outfit', sans-serif;
    font-size: 0.8rem;
    padding: 8px 10px;
    border-radius: 999px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    cursor: pointer;
    text-align: center;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    transition: background 0.15s, border-color 0.15s, transform 0.1s;
  }

  .cat-chip:hover {
    background: var(--border);
    border-color: var(--accent);
    transform: translateY(-1px);
  }

  .cat-chip.active {
    background: var(--accent-dim);
    border-color: var(--accent);
  }

  .nav-links {
    margin-top: 24px;
    font-size: 0.9rem;
  }

  .nav-links a {
    color: var(--accent);
    text-decoration: none;
  }

  .nav-links a:hover {
    text-decoration: underline;
  }
</style>
</head>
<body>

  <h1>Test denumiri IUPAC</h1>
  <p class="subtitle">Privește structura și scrie corect denumirea IUPAC (sau denumirea uzuală, în română)</p>

  <div class="app">
    <div class="score-bar">
      <span>Compus <strong id="currentNum">1</strong> din <strong id="totalCount">—</strong></span>
      <span>Scor: <strong id="score">0</strong> corecte</span>
    </div>

    <div class="canvas-wrap">
      <canvas id="moleculeCanvas" width="480" height="280"></canvas>
    </div>

    <div class="category-section">
      <div class="category-title">Alege tipul de compuși organici:</div>
      <div class="category-grid">
        <button type="button" class="cat-chip active" data-cat="toate">Toate</button>
        <button type="button" class="cat-chip" data-cat="alcooli">Alcooli</button>
        <button type="button" class="cat-chip" data-cat="fenoli">Fenoli</button>
        <button type="button" class="cat-chip" data-cat="amine">Amine</button>
        <button type="button" class="cat-chip" data-cat="nitroderivati">Nitroderivați</button>
        <button type="button" class="cat-chip" data-cat="compusi carbonilici">Compuși carbonilici</button>
        <button type="button" class="cat-chip" data-cat="compusi carboxilici">Compuși carboxilici</button>
        <button type="button" class="cat-chip" data-cat="grasimi">Grăsimi</button>
        <button type="button" class="cat-chip" data-cat="acizi grasi">Acizi grași</button>
        <button type="button" class="cat-chip" data-cat="aminoacizi">Aminoacizi</button>
        <button type="button" class="cat-chip" data-cat="proteine">Proteine</button>
        <button type="button" class="cat-chip" data-cat="zaharide">Zaharide</button>
        <button type="button" class="cat-chip" data-cat="acizi nucleici">Acizi nucleici</button>
        <button type="button" class="cat-chip" data-cat="vitamine">Vitamine</button>
      </div>
    </div>

    <div class="answer-section">
      <label for="answerInput">Denumire IUPAC sau denumire uzuală (în română)</label>
      <input type="text" id="answerInput" placeholder="ex.: etanol, acid acetic, benzen" autocomplete="off">
      <div class="btn-row">
        <button type="button" class="btn btn-primary" id="btnCheck">Verifică</button>
        <button type="button" class="btn btn-secondary" id="btnNext">Următorul compus</button>
      </div>
      <div class="feedback" id="feedback"></div>
    </div>
  </div>

  <p class="nav-links">
    <a href="lewis-structure.html">← Constructor structuri Lewis</a>
  </p>

  <script src="compounds.js"></script>
  <script>
  (function() {
    const allCompounds = typeof UNIQUE_COMPOUNDS !== 'undefined' ? UNIQUE_COMPOUNDS : ORGANIC_COMPOUNDS;
    if (!allCompounds || allCompounds.length === 0) {
      document.getElementById('feedback').textContent = 'No compounds loaded. Check compounds.js';
      return;
    }

    const canvas = document.getElementById('moleculeCanvas');
    const answerInput = document.getElementById('answerInput');
    const btnCheck = document.getElementById('btnCheck');
    const btnNext = document.getElementById('btnNext');
    const feedbackEl = document.getElementById('feedback');
    const currentNumEl = document.getElementById('currentNum');
    const totalCountEl = document.getElementById('totalCount');
    const scoreEl = document.getElementById('score');
    const categoryChips = document.querySelectorAll('.cat-chip');

    const drawer = new SmilesDrawer.Drawer({
      width: 480,
      height: 280
    });

    let currentCompound = null;
    let currentIndex = 0;
    let score = 0;
    let answered = false;
    let currentCategory = 'toate';
    let activeCompounds = allCompounds.slice();

    totalCountEl.textContent = activeCompounds.length;

    function normalize(s) {
      return (s || '').toLowerCase().trim().replace(/\s+/g, ' ');
    }

    function isMatch(user, compound) {
      const u = normalize(user);
      if (!u) return false;
      // Romanian main name
      if (compound.roName && normalize(compound.roName) === u) return true;
      // Romanian aliases
      if (compound.aliasesRo && Array.isArray(compound.aliasesRo)) {
        for (const a of compound.aliasesRo) {
          if (normalize(a) === u) return true;
        }
      }
      // English IUPAC / aliases as fallback
      if (normalize(compound.iupac) === u) return true;
      if (compound.aliases && Array.isArray(compound.aliases)) {
        for (const a of compound.aliases) {
          if (normalize(a) === u) return true;
        }
      }
      return false;
    }

    function drawStructure(smiles) {
      SmilesDrawer.parse(smiles, function(tree) {
        drawer.draw(tree, 'moleculeCanvas', 'dark', false);
      }, function(err) {
        console.error(err);
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#8b9cb3';
        ctx.font = '16px Outfit, sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('Could not draw structure', canvas.width / 2, canvas.height / 2);
      });
    }

    function pickRandom() {
      if (!activeCompounds.length) {
        feedbackEl.textContent = 'Nu există încă compuși în această categorie.';
        feedbackEl.className = 'feedback wrong';
        answerInput.disabled = true;
        return;
      }

      currentCompound = activeCompounds[Math.floor(Math.random() * activeCompounds.length)];
      currentIndex += 1;
      currentNumEl.textContent = currentIndex;
      answered = false;
      answerInput.value = '';
      answerInput.classList.remove('correct', 'wrong');
      answerInput.disabled = false;
      feedbackEl.textContent = '';
      feedbackEl.className = 'feedback';
      drawStructure(currentCompound.smiles);
      answerInput.focus();
    }

    function showResult(correct) {
      answered = true;
      answerInput.disabled = true;
      if (correct) {
        score += 1;
        scoreEl.textContent = score;
        feedbackEl.textContent = 'Corect!';
        feedbackEl.className = 'feedback correct';
        answerInput.classList.add('correct');
        answerInput.classList.remove('wrong');
      } else {
        const numeCorect = currentCompound.roName || currentCompound.iupac;
        feedbackEl.innerHTML = 'Greșit. <span class="correct-answer">Răspuns corect: ' + escapeHtml(numeCorect) + '</span>';
        feedbackEl.className = 'feedback wrong';
        answerInput.classList.add('wrong');
        answerInput.classList.remove('correct');
      }
    }

    function escapeHtml(s) {
      const div = document.createElement('div');
      div.textContent = s;
      return div.innerHTML;
    }

    btnCheck.addEventListener('click', function() {
      if (!currentCompound || answered) return;
      const userAnswer = answerInput.value;
      showResult(isMatch(userAnswer, currentCompound));
    });

    answerInput.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') {
        if (answered) pickRandom();
        else btnCheck.click();
      }
    });

    btnNext.addEventListener('click', pickRandom);

    // Category selection
    categoryChips.forEach((chip) => {
      chip.addEventListener('click', () => {
        categoryChips.forEach((c) => c.classList.remove('active'));
        chip.classList.add('active');
        currentCategory = chip.getAttribute('data-cat') || 'toate';

        if (currentCategory === 'toate') {
          activeCompounds = allCompounds.slice();
        } else {
          activeCompounds = allCompounds.filter((c) => c.category === currentCategory);
        }

        currentIndex = 0;
        totalCountEl.textContent = activeCompounds.length;
        feedbackEl.textContent = '';
        feedbackEl.className = 'feedback';
        answerInput.value = '';
        answerInput.classList.remove('correct', 'wrong');
        answerInput.disabled = false;
        pickRandom();
      });
    });

    pickRandom();
  })();
  </script>
</body>
</html>
