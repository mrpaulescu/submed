<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lewis Structure Builder</title>
<link rel="stylesheet" href="assets/styles/style.css">
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Outfit:wght@400;600;700&display=swap');

  * { box-sizing: border-box; }

  :root {
    --bg: #0f1419;
    --surface: #1a2332;
    --surface2: #243044;
    --border: #2d3d52;
    --text: #e6edf3;
    --muted: #8b9cb3;
    --accent: #58a6ff;
    --accent-dim: #388bfd66;
    --success: #3fb950;
    --danger: #f85149;
    --carbon: #6e7681;
    --hydrogen: #79c0ff;
    --oxygen: #ff7b72;
    --nitrogen: #a371f7;
  }

  body {
    font-family: 'Outfit', sans-serif;
    background: var(--bg);
    color: var(--text);
    margin: 0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px;
  }

  h1 {
    font-weight: 700;
    font-size: 1.75rem;
    letter-spacing: -0.02em;
    margin: 0 0 8px 0;
    background: linear-gradient(135deg, #58a6ff, #a371f7);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .subtitle {
    color: var(--muted);
    font-size: 0.9rem;
    margin-bottom: 20px;
  }

  .app {
    display: flex;
    flex-direction: column;
    gap: 20px;
    max-width: 900px;
    width: 100%;
  }

  .toolbar {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    align-items: center;
    padding: 16px;
    background: var(--surface);
    border-radius: 12px;
    border: 1px solid var(--border);
  }

  .tool-group {
    display: flex;
    align-items: center;
    gap: 8px;
    padding-right: 12px;
    border-right: 1px solid var(--border);
  }
  .tool-group:last-of-type { border-right: none; padding-right: 0; }

  .tool-group label {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--muted);
  }

  .btn-tool {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 600;
    padding: 8px 12px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s, box-shadow 0.15s;
  }
  .btn-tool:hover {
    background: var(--border);
    border-color: var(--accent);
  }
  .btn-tool.active {
    background: var(--accent-dim);
    border-color: var(--accent);
    box-shadow: 0 0 0 1px var(--accent);
  }

  .btn-atom {
    min-width: 36px;
  }
  .btn-atom.C { color: var(--carbon); }
  .btn-atom.H { color: var(--hydrogen); }
  .btn-atom.O { color: var(--oxygen); }
  .btn-atom.N { color: var(--nitrogen); }

  .canvas-wrap {
    background: var(--surface);
    border-radius: 12px;
    border: 1px solid var(--border);
    padding: 20px;
    min-height: 380px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #lewisCanvas {
    background: #0d1117;
    border-radius: 8px;
    cursor: crosshair;
    display: block;
  }

  .name-section {
    display: flex;
    flex-direction: column;
    gap: 10px;
    padding: 20px;
    background: var(--surface);
    border-radius: 12px;
    border: 1px solid var(--border);
  }

  .name-section label {
    font-size: 0.85rem;
    color: var(--muted);
  }

  .name-section input {
    font-family: 'Outfit', sans-serif;
    font-size: 1.1rem;
    padding: 14px 18px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    width: 100%;
  }
  .name-section input::placeholder {
    color: var(--muted);
    opacity: 0.8;
  }
  .name-section input:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-dim);
  }

  .hint {
    font-size: 0.8rem;
    color: var(--muted);
    margin-top: 4px;
  }
</style>
</head>
<body>

  <h1>Lewis Structure Builder</h1>
  <p class="subtitle">Draw the structure, then enter the substance name</p>

  <div class="app">
    <div class="toolbar">
      <div class="tool-group">
        <label>Tool</label>
        <button type="button" class="btn-tool active" data-tool="atom" id="tool-atom">Add atom</button>
        <button type="button" class="btn-tool" data-tool="bond" id="tool-bond">Bond</button>
        <button type="button" class="btn-tool" data-tool="lone" id="tool-lone">Lone pairs</button>
        <button type="button" class="btn-tool" data-tool="move" id="tool-move">Move</button>
        <button type="button" class="btn-tool" data-tool="delete" id="tool-delete">Delete</button>
      </div>
      <div class="tool-group">
        <label>Element</label>
        <button type="button" class="btn-tool btn-atom C" data-element="C">C</button>
        <button type="button" class="btn-tool btn-atom H" data-element="H">H</button>
        <button type="button" class="btn-tool btn-atom N" data-element="N">N</button>
        <button type="button" class="btn-tool btn-atom O" data-element="O">O</button>
        <button type="button" class="btn-tool" data-element="F">F</button>
        <button type="button" class="btn-tool" data-element="S">S</button>
        <button type="button" class="btn-tool" data-element="P">P</button>
        <button type="button" class="btn-tool" data-element="Cl">Cl</button>
        <button type="button" class="btn-tool" data-element="Br">Br</button>
        <button type="button" class="btn-tool" data-element="I">I</button>
      </div>
      <div class="tool-group">
        <label>Bond order</label>
        <button type="button" class="btn-tool active" data-order="1">Single</button>
        <button type="button" class="btn-tool" data-order="2">Double</button>
        <button type="button" class="btn-tool" data-order="3">Triple</button>
      </div>
      <div class="tool-group">
        <button type="button" class="btn-tool" id="btn-clear">Clear all</button>
      </div>
    </div>

    <div class="canvas-wrap">
      <svg id="lewisCanvas" width="840" height="340" viewBox="0 0 840 340"></svg>
    </div>

    <div class="name-section">
      <label for="substanceName">Substance name</label>
      <input type="text" id="substanceName" placeholder="e.g. water, methane, carbon dioxide">
      <span class="hint">Type the name of the compound or molecule you drew above.</span>
    </div>
  </div>

  <script>
  (function() {
    const svg = document.getElementById('lewisCanvas');
    const NS = 'http://www.w3.org/2000/svg';

    let atoms = [];
    let bonds = [];
    let nextId = 1;
    let tool = 'atom';
    let currentElement = 'C';
    let bondOrder = 2;
    let bondFirst = null;
    let lonePairTarget = null;
    let dragAtom = null;
    let dragOffset = { x: 0, y: 0 };

    const R = 22;
    const BOND_LENGTH = 42;
    const LONE_R = 5;
    const LONE_OFF = 14;

    function getPt(e) {
      const rect = svg.getBoundingClientRect();
      const vw = svg.viewBox.baseVal.width;
      const vh = svg.viewBox.baseVal.height;
      return {
        x: ((e.clientX - rect.left) / rect.width) * vw,
        y: ((e.clientY - rect.top) / rect.height) * vh
      };
    }

    function findAtomAt(x, y) {
      for (let i = atoms.length - 1; i >= 0; i--) {
        const a = atoms[i];
        const d = Math.hypot(a.x - x, a.y - y);
        if (d <= R * 1.5) return a;
      }
      return null;
    }

    function bondKey(a, b) {
      const id1 = Math.min(a.id, b.id);
      const id2 = Math.max(a.id, b.id);
      return id1 + '-' + id2;
    }

    function getBond(a, b) {
      const key = bondKey(a, b);
      return bonds.find(b => bondKey(b.from, b.to) === key);
    }

    function addBond(from, to, order) {
      if (from.id === to.id) return;
      const existing = getBond(from, to);
      const ord = order || 1;
      if (existing) {
        existing.order = ord;
      } else {
        bonds.push({ from, to, order: ord });
      }
      render();
    }

    function addLonePairs(atom) {
      atom.lonePairs = ((atom.lonePairs || 0) + 1) % 4;
      render();
    }

    function deleteAt(atom) {
      bonds = bonds.filter(b => b.from !== atom && b.to !== atom);
      atoms = atoms.filter(a => a !== atom);
      render();
    }

    function render() {
      while (svg.firstChild) svg.removeChild(svg.firstChild);

      const gBonds = document.createElementNS(NS, 'g');
      gBonds.setAttribute('class', 'bonds');
      bonds.forEach(b => {
        const dx = b.to.x - b.from.x;
        const dy = b.to.y - b.from.y;
        const len = Math.hypot(dx, dy) || 1;
        const ux = dx / len;
        const uy = dy / len;
        const perpX = -uy;
        const perpY = ux;
        const sep = 6;

        for (let i = 0; i < (b.order || 1); i++) {
          const line = document.createElementNS(NS, 'line');
          const off = (b.order === 1) ? 0 : (i - (b.order - 1) / 2) * sep;
          line.setAttribute('x1', b.from.x + perpX * off);
          line.setAttribute('y1', b.from.y + perpY * off);
          line.setAttribute('x2', b.to.x + perpX * off);
          line.setAttribute('y2', b.to.y + perpY * off);
          line.setAttribute('stroke', '#8b9cb3');
          line.setAttribute('stroke-width', 2.5);
          line.setAttribute('stroke-linecap', 'round');
          gBonds.appendChild(line);
        }
        svg.appendChild(gBonds);
      });

      atoms.forEach(a => {
        const g = document.createElementNS(NS, 'g');
        g.setAttribute('data-id', a.id);

        const circle = document.createElementNS(NS, 'circle');
        circle.setAttribute('cx', a.x);
        circle.setAttribute('cy', a.y);
        circle.setAttribute('r', R);
        circle.setAttribute('fill', '#1a2332');
        circle.setAttribute('stroke', '#2d3d52');
        circle.setAttribute('stroke-width', 2);
        g.appendChild(circle);

        const lp = a.lonePairs || 0;
        const positions = [
          [],
          [{ x: LONE_OFF, y: 0 }],
          [{ x: -LONE_OFF, y: 0 }, { x: LONE_OFF, y: 0 }],
          [{ x: -LONE_OFF, y: 0 }, { x: LONE_OFF, y: 0 }, { x: 0, y: -LONE_OFF }],
          [{ x: -LONE_OFF, y: 0 }, { x: LONE_OFF, y: 0 }, { x: 0, y: -LONE_OFF }, { x: 0, y: LONE_OFF }]
        ];
        (positions[lp] || []).forEach((p, i) => {
          const dot = document.createElementNS(NS, 'circle');
          dot.setAttribute('cx', a.x + p.x);
          dot.setAttribute('cy', a.y + p.y);
          dot.setAttribute('r', LONE_R);
          dot.setAttribute('fill', '#79c0ff');
          g.appendChild(dot);
        });

        const text = document.createElementNS(NS, 'text');
        text.setAttribute('x', a.x);
        text.setAttribute('y', a.y);
        text.setAttribute('text-anchor', 'middle');
        text.setAttribute('dominant-baseline', 'central');
        text.setAttribute('fill', '#e6edf3');
        text.setAttribute('font-size', a.element.length > 1 ? 14 : 18);
        text.setAttribute('font-family', 'JetBrains Mono, monospace');
        text.setAttribute('font-weight', '600');
        text.textContent = a.element;
        g.appendChild(text);

        svg.appendChild(g);
      });
    }

    svg.addEventListener('mousedown', function(e) {
      const pt = getPt(e);
      const atom = findAtomAt(pt.x, pt.y);

      if (tool === 'atom') {
        atoms.push({
          id: nextId++,
          element: currentElement,
          x: Math.round(pt.x / 20) * 20,
          y: Math.round(pt.y / 20) * 20,
          lonePairs: 0
        });
        render();
        return;
      }

      if (tool === 'bond') {
        if (atom) {
          if (!bondFirst) {
            bondFirst = atom;
          } else {
            addBond(bondFirst, atom, bondOrder);
            bondFirst = null;
          }
        } else {
          bondFirst = null;
        }
        render();
        return;
      }

      if (tool === 'lone') {
        if (atom) addLonePairs(atom);
        return;
      }

      if (tool === 'delete') {
        if (atom) deleteAt(atom);
        return;
      }

      if (tool === 'move' && atom) {
        dragAtom = atom;
        dragOffset = { x: pt.x - atom.x, y: pt.y - atom.y };
      }
    });

    svg.addEventListener('mousemove', function(e) {
      if (!dragAtom) return;
      const pt = getPt(e);
      dragAtom.x = Math.round((pt.x - dragOffset.x) / 10) * 10;
      dragAtom.y = Math.round((pt.y - dragOffset.y) / 10) * 10;
      render();
    });

    svg.addEventListener('mouseup', function() {
      dragAtom = null;
    });
    svg.addEventListener('mouseleave', function() {
      dragAtom = null;
    });

    document.querySelectorAll('[data-tool]').forEach(btn => {
      btn.addEventListener('click', function() {
        document.querySelectorAll('.btn-tool[data-tool]').forEach(b => b.classList.remove('active'));
        this.classList.add('active');
        tool = this.dataset.tool;
        bondFirst = null;
      });
    });

    document.querySelectorAll('[data-element]').forEach(btn => {
      btn.addEventListener('click', function() {
        document.querySelectorAll('[data-element]').forEach(b => b.classList.remove('active'));
        this.classList.add('active');
        currentElement = this.dataset.element;
      });
    });

    document.querySelectorAll('[data-order]').forEach(btn => {
      btn.addEventListener('click', function() {
        document.querySelectorAll('[data-order]').forEach(b => b.classList.remove('active'));
        this.classList.add('active');
        bondOrder = parseInt(this.dataset.order, 10);
      });
    });

    document.getElementById('btn-clear').addEventListener('click', function() {
      atoms = [];
      bonds = [];
      bondFirst = null;
      render();
    });

    document.querySelector('[data-element="C"]').classList.add('active');
    render();
  })();
  </script>
</body>
</html>
